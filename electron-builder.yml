appId: com.appliedscope.plumb
productName: Plumb
copyright: Copyright © Applied Scope

directories:
  output: release/dist
  buildResources: build

files:
  - notch/dist-electron/**/*
  - notch/dist-renderer/**/*
  - package.json

extraResources:
  - from: release/server
    to: server
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: Plumb
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: ovsharam
  repo: stream-app
  releaseType: release

afterPack: scripts/notch-after-pack.mjs
